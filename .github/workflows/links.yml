name: links

on:
  pull_request:
    paths:
      - '**.md'
      - 'scripts/check-links.sh'
      - '.github/workflows/links.yml'
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'scripts/check-links.sh'
      - '.github/workflows/links.yml'

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run link checker
        run: bash scripts/check-links.sh
